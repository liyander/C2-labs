services:
  windows-agent:
    build:
      context: ./docker/windows-agent
    image: c2-labs-windows-agent:latest
    container_name: windows-agent
    profiles: ["windows"]
    restart: unless-stopped
    environment:
      AGENT_LAUNCHER: ${WINDOWS_AGENT_LAUNCHER:-}
    networks:
      - c2_lab

  windows-victim:
    build:
      context: ./docker/windows-victim
    image: c2-labs-windows-victim:latest
    container_name: windows-victim
    profiles: ["windows"]
    restart: unless-stopped
    environment:
      BEACON_LAUNCHER: ${WINDOWS_VICTIM_LAUNCHER:-}
    networks:
      - c2_lab

networks:
  c2_lab:
    external: true
    name: c2-lab-net
